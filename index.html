<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SublimArte</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f172a;color:white;}

nav{
display:flex;justify-content:space-between;align-items:center;
padding:20px 40px;position:fixed;width:100%;z-index:1000;
background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);
}

.logo{color:#22c55e;font-weight:600;}
.menu{display:flex;gap:20px;align-items:center;}
.menu a{color:white;text-decoration:none;cursor:pointer;}

.cart{
background:#22c55e;padding:5px 10px;border-radius:20px;
}

.hero{
height:100vh;display:flex;justify-content:center;align-items:center;
text-align:center;background:linear-gradient(135deg,#22c55e,#3b82f6);
}

.btn{
background:#22c55e;padding:10px 20px;border-radius:25px;
cursor:pointer;border:none;color:white;
}

/* PRODUCTOS */
.products{
display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;padding:80px 40px;
}

.product{
background:#1e293b;padding:20px;border-radius:15px;text-align:center;
}

.product button{margin-top:10px;}

/* MODAL */
.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.8);display:none;
justify-content:center;align-items:center;
}

.modal.active{display:flex;}

.modal-box{
background:#1e293b;padding:30px;border-radius:10px;width:300px;
}

.modal input{
width:100%;padding:10px;margin:10px 0;border:none;border-radius:5px;
}

/* CARRITO */
.cart-panel{
position:fixed;right:-100%;top:0;width:300px;height:100%;
background:#020617;padding:20px;transition:0.4s;
}

.cart-panel.active{right:0;}

</style>
</head>

<body>

<nav>
<div class="logo">SublimArte</div>

<div class="menu">
<a onclick="openLogin()">Login</a>
<a onclick="openRegister()">Registro</a>
<a onclick="toggleCart()">Carrito <span id="cartCount" class="cart">0</span></a>
</div>
</nav>

<div class="hero">
<div>
<h1>Tu diseño, tu estilo</h1>
<p>Comprá productos personalizados</p>
<button class="btn">Ver productos</button>
</div>
</div>

<section class="products" id="products"></section>

<!-- LOGIN -->
<div class="modal" id="loginModal">
<div class="modal-box">
<h3>Login</h3>
<input id="loginUser" placeholder="Usuario">
<input id="loginPass" type="password" placeholder="Contraseña">
<button class="btn" onclick="login()">Entrar</button>
</div>
</div>

<!-- REGISTER -->
<div class="modal" id="registerModal">
<div class="modal-box">
<h3>Registro</h3>
<input id="regUser" placeholder="Usuario">
<input id="regPass" type="password" placeholder="Contraseña">
<button class="btn" onclick="register()">Crear cuenta</button>
</div>
</div>

<!-- CARRITO -->
<div class="cart-panel" id="cartPanel">
<h3>Carrito</h3>
<div id="cartItems"></div>
<br>
<button class="btn" onclick="checkout()">Comprar</button>
</div>

<script>

// PRODUCTOS
const productos = [
{name:"Taza personalizada", precio:3000},
{name:"Remera sublimada", precio:6000},
{name:"Gorra", precio:4000},
{name:"Almohadón", precio:5000}
];

let cart = JSON.parse(localStorage.getItem("cart")) || [];

// RENDER PRODUCTOS
const container = document.getElementById("products");

productos.forEach((p,i)=>{
container.innerHTML += `
<div class="product">
<h3>${p.name}</h3>
<p>$${p.precio}</p>
<button onclick="addToCart(${i})" class="btn">Agregar</button>
</div>`;
});

// AGREGAR AL CARRITO
function addToCart(i){
cart.push(productos[i]);
localStorage.setItem("cart", JSON.stringify(cart));
updateCart();
}

// ACTUALIZAR CARRITO
function updateCart(){
document.getElementById("cartCount").innerText = cart.length;

let items = "";
cart.forEach(p=>{
items += `<p>${p.name} - $${p.precio}</p>`;
});
document.getElementById("cartItems").innerHTML = items;
}

updateCart();

// TOGGLE CARRITO
function toggleCart(){
document.getElementById("cartPanel").classList.toggle("active");
}

// LOGIN / REGISTER
function openLogin(){
document.getElementById("loginModal").classList.add("active");
}
function openRegister(){
document.getElementById("registerModal").classList.add("active");
}

function register(){
let u = regUser.value;
let p = regPass.value;
localStorage.setItem("user", u);
localStorage.setItem("pass", p);
alert("Registrado");
}

function login(){
let u = loginUser.value;
let p = loginPass.value;

if(u === localStorage.getItem("user") && p === localStorage.getItem("pass")){
alert("Bienvenido " + u);
}else{
alert("Datos incorrectos");
}
}

// CHECKOUT
function checkout(){
alert("Compra realizada (demo)");
cart = [];
localStorage.removeItem("cart");
updateCart();
}

// CERRAR MODALES
window.onclick = function(e){
document.querySelectorAll(".modal").forEach(m=>{
if(e.target === m) m.classList.remove("active");
});
}

</script>

</body>
</html>
