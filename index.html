<!DOCTYPE html>
<html>
<head>
  <title>Sublimación Ezequiel</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background-color: #0f172a;
      color: white;
    }

    header {
      background-color: #1e293b;
      padding: 20px;
      text-align: center;
    }

    h1 {
      margin: 0;
      color: #38bdf8;
    }

    .container {
      padding: 20px;
    }

    .productos {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .card {
      background-color: #1e293b;
      padding: 15px;
      border-radius: 10px;
      width: 200px;
      text-align: center;
    }

    .card h3 {
      margin: 10px 0;
    }

    .contacto {
      text-align: center;
      margin-top: 40px;
    }

    .boton {
      background-color: #38bdf8;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>

</head>
<body>

  <header>
    <h1>Sublimación Ezequiel</h1>
    <p>Remeras, tazas, llaveros y más</p>
  </header>

  <div class="container">

    <h2 style="text-align:center;">Nuestros productos</h2>

    <div class="productos">

      <div class="card">
        <h3>Remeras</h3>
        <p>Diseños personalizados</p>
      </div>

      <div class="card">
        <h3>Tazas</h3>
        <p>Ideales para regalos</p>
      </div>

      <div class="card">
        <h3>Llaveros</h3>
        <p>Con fotos o nombres</p>
      </div>

    </div>

    <div class="contacto">
      <h2>Contacto</h2>
      <p>WhatsApp: 123456789</p>
      <p>Instagram: @tuemprendimiento</p>

      <button class="boton" onclick="mensaje()">Consultar</button>
    </div>

  </div>

  <script>
    function mensaje() {
      alert("Escribinos por WhatsApp 😊");
    }
  </script>

</body>
</html>
