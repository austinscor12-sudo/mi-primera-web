<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SublimArte Pro</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#020617;color:white;overflow-x:hidden;}
/* CONTACTO PRO */
.contact-box{
margin-top:30px;
padding:30px;
background:rgba(255,255,255,0.05);
border-radius:20px;
backdrop-filter:blur(10px);
text-align:center;
transition:0.4s;
transform-style:preserve-3d;
}

/* efecto 3D al pasar el mouse */
.contact-box:hover{
transform:rotateY(5deg) rotateX(5deg) scale(1.03);
box-shadow:0 0 40px rgba(34,197,94,0.4);
}

/* boton animado */
.contact-btn{
display:inline-block;
margin-top:20px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.08);}
100%{transform:scale(1);}
}

/* info */
.contact-info{
margin-top:25px;
line-height:1.8;
opacity:0.9;
}

/* animacion entrada */
#contacto{
animation:fadeUp 0.8s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

/* NAV */
nav{position:fixed;width:100%;display:flex;justify-content:space-between;padding:20px 40px;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);z-index:1000;}
.logo{color:#22c55e;font-weight:600;font-size:20px;}
.menu{display:flex;gap:25px;}
.menu a{cursor:pointer;text-decoration:none;color:white;opacity:0.8;}
.menu a:hover{opacity:1;}

/* HERO */
.hero{height:100vh;display:flex;justify-content:center;align-items:center;text-align:center;background:linear-gradient(135deg,#22c55e,#3b82f6);animation:fadeIn 1s;}
.hero h1{font-size:60px;max-width:600px;}
.btn{background:#22c55e;padding:14px 30px;border-radius:30px;cursor:pointer;border:none;margin-top:20px;color:white;transition:0.3s;}
.btn:hover{transform:scale(1.08);box-shadow:0 0 20px #22c55e;}

/* SECCIONES */
section{padding:100px 60px;max-width:1200px;margin:auto;animation:fadeIn 1.5s;}

/* PRODUCTOS */
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:30px;}
.card{background:#111827;border-radius:20px;overflow:hidden;transition:0.4s;}
.card img{width:100%;height:220px;object-fit:cover;}
.card:hover{transform:translateY(-10px) scale(1.02);box-shadow:0 0 30px rgba(34,197,94,0.4);}

/* CARRITO */
.cart{position:fixed;right:20px;bottom:20px;background:#22c55e;padding:15px;border-radius:50%;cursor:pointer;}
.cart-panel{position:fixed;right:-350px;top:0;width:350px;height:100%;background:#020617;padding:20px;transition:0.4s;}
.cart-panel.active{right:0;}

/* IA */
.ai-btn{position:fixed;left:20px;bottom:20px;background:#22c55e;padding:15px;border-radius:50%;cursor:pointer;}
.ai-box{position:fixed;left:20px;bottom:90px;width:280px;height:350px;background:#111827;display:none;flex-direction:column;padding:10px;border-radius:10px;}
.ai-box.active{display:flex;}
#chat{flex:1;overflow:auto;font-size:14px;}
input{padding:10px;border:none;border-radius:5px;}

/* Animacion fadeIn */
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
</style>
</head>

<body>

<nav>
<div class="logo">SublimArte</div>
<div class="menu">
<a onclick="goHome()">Inicio</a>
<a onclick="showProductos()">Productos</a>
<a onclick="showContacto()">Contacto</a>
</div>
</nav>

<!-- HERO -->
<div id="home" class="hero">
<div>
<h1>Convertimos tus ideas en productos únicos</h1>
<button class="btn" onclick="showProductos()">Comprar ahora</button>
</div>
</div>

<!-- PRODUCTOS -->
<section id="productos" style="display:none;">
<h2>Productos</h2>
<div class="grid" id="grid"></div>
</section>

<section id="contacto" style="display:none;">
<h2>Contacto</h2>

<div class="contact-box">

<p>Escribinos por nuestros canales 👇</p>

<a href="https://wa.me/5491123456789" class="btn contact-btn">💬 WhatsApp</a>

<div class="contact-info">
<p>📧 contacto@sublimartepro.com</p>
<p>📞 +54 9 11 2345-6789</p>
<p>📍 Buenos Aires, Argentina</p>
<p>📸 Instagram: @sublimarte.pro</p>
</div>

</div>

</section>

<!-- CARRITO -->
<div class="cart" onclick="toggleCart()">🛒</div>
<div class="cart-panel" id="cartPanel">
<div class="cart-header">
<h3>Carrito</h3>
<span class="close-cart" onclick="toggleCart()">✖</span>
</div>

<div id="cartItems"></div>

<button class="btn">Finalizar compra</button>
</div>

<!-- IA -->
<div class="ai-btn" onclick="toggleAI()">🤖</div>
<div class="ai-box" id="aiBox">
<div id="chat"></div>
<input id="msg" placeholder="Preguntá...">
</div>

<script>
// NAV
function goHome(){home.style.display="flex";productos.style.display="none";contacto.style.display="none";}
function showProductos(){home.style.display="none";productos.style.display="block";contacto.style.display="none";}
function showContacto(){home.style.display="none";productos.style.display="none";contacto.style.display="block";}

// PRODUCTOS
const productosArr=[
{name:"Taza personalizada",precio:3000,img:"https://images.unsplash.com/photo-1606813909024-1f6b7c6aefc7"},
{name:"Remera premium",precio:6000,img:"https://images.unsplash.com/photo-1585386959984-a41552231658"},
{name:"Gorra",precio:4000,img:"https://images.unsplash.com/photo-1593032465175-481ac7f401c0"}
];
productosArr.forEach((p,i)=>{grid.innerHTML+=`<div class="card"><img src="${p.img}"><h3>${p.name}</h3><p>$${p.precio}</p><button class="btn" onclick="add(${i})">Agregar</button></div>`;});

// CARRITO
let cart=[];
function add(i){cart.push(productosArr[i]);render();}
function render(){cartItems.innerHTML=cart.map(p=>`<p>${p.name} - $${p.precio}</p>`).join("");}
function toggleCart(){cartPanel.classList.toggle("active");}

// IA
msg.addEventListener("keypress",e=>{
if(e.key==="Enter"){
let t=msg.value.toLowerCase();
let r="Te puedo ayudar a elegir productos 😉";
if(t.includes("precio")) r="Tenemos opciones desde $3000";
if(t.includes("envio")) r="Enviamos a todo el país 🚚";
if(t.includes("regalo")) r="Las tazas personalizadas son ideales 🎁";
chat.innerHTML+=`<p><b>Vos:</b> ${t}</p>`;
chat.innerHTML+=`<p><b>IA:</b> ${r}</p>`;
msg.value="";
}
});
function toggleAI(){aiBox.classList.toggle("active");}
</script>

</body>
</html>
