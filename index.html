<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SublimArte</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0b1120;color:white;overflow-x:hidden;}

/* NAV */
nav{
position:fixed;width:100%;display:flex;justify-content:space-between;
padding:20px 40px;z-index:1000;
background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);
}

.logo{color:#22c55e;font-weight:600;}

.menu{display:flex;gap:20px;}
.menu a{cursor:pointer;text-decoration:none;color:white;}

.back-btn{
position:fixed;top:80px;left:20px;
background:#22c55e;padding:8px 15px;border-radius:20px;
cursor:pointer;display:none;
}

/* HERO */
.hero{
height:100vh;
display:flex;justify-content:center;align-items:center;
text-align:center;
background:linear-gradient(135deg,#22c55e,#3b82f6);
}

.hero h1{font-size:50px;}

.btn{
background:#22c55e;
padding:12px 25px;
border-radius:30px;
cursor:pointer;
border:none;
color:white;
margin-top:20px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 20px #22c55e;
}

/* SECCIONES */
section{padding:80px 40px;}

/* PRODUCTOS */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#1e293b;
border-radius:15px;
overflow:hidden;
transition:0.3s;
transform-style:preserve-3d;
}

.card img{width:100%;height:200px;object-fit:cover;}

.card:hover{
transform:translateY(-10px) scale(1.02);
box-shadow:0 0 25px rgba(34,197,94,0.5);
}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
padding:15px;
border-radius:50%;
font-size:25px;
}

/* CHAT IA */
.ai-btn{
position:fixed;
bottom:20px;
left:20px;
background:#22c55e;
padding:15px;
border-radius:50%;
cursor:pointer;
}

.ai-chat{
position:fixed;
bottom:80px;
left:20px;
width:260px;
height:320px;
background:#1e293b;
display:none;
flex-direction:column;
padding:10px;
border-radius:10px;
}

.ai-chat.active{display:flex;}

#chatBox{flex:1;overflow:auto;font-size:14px;}

input{padding:10px;border:none;border-radius:5px;}

/* LOGIN */
.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;justify-content:center;align-items:center;
}

.modal.active{display:flex;}

.modal-box{
background:#1e293b;padding:30px;border-radius:10px;width:300px;
}

/* SCROLL ANIM */
.reveal{
opacity:0;
transform:translateY(40px);
transition:1s;
}

.reveal.active{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<nav>
<div class="logo">SublimArte</div>
<div class="menu">
<a onclick="goHome()">Inicio</a>
<a onclick="showProductos()">Productos</a>
<a onclick="showCategorias()">Categorías</a>
<a onclick="openLogin()">Login</a>
</div>
</nav>

<div class="back-btn" onclick="goBack()">← Volver</div>

<!-- HERO -->
<div id="home" class="hero">
<div>
<h1>Diseños personalizados únicos</h1>
<p>Transformamos tus ideas en productos reales</p>
<button class="btn" onclick="showProductos()">Ver productos</button>
</div>
</div>

<!-- PRODUCTOS -->
<section id="productos" style="display:none;">
<h2>Productos</h2>
<div class="grid">

<div class="card reveal">
<img src="https://images.unsplash.com/photo-1606813909024-1f6b7c6aefc7">
<h3>Taza personalizada</h3>
</div>

<div class="card reveal">
<img src="https://images.unsplash.com/photo-1585386959984-a41552231658">
<h3>Remeras</h3>
</div>

<div class="card reveal">
<img src="https://images.unsplash.com/photo-1593032465175-481ac7f401c0">
<h3>Gorras</h3>
</div>

<div class="card reveal">
<img src="https://images.unsplash.com/photo-1616628182504-6c9e7e7b6f77">
<h3>Almohadones</h3>
</div>

</div>
</section>

<!-- CATEGORIAS -->
<section id="categorias" style="display:none;">
<h2>Categorías</h2>
<ul>
<li>Tazas</li>
<li>Textiles</li>
<li>Accesorios</li>
<li>Regalos personalizados</li>
</ul>
</section>

<!-- LOGIN -->
<div class="modal" id="loginModal">
<div class="modal-box">
<h3>Login</h3>
<input placeholder="Usuario"><br><br>
<input placeholder="Contraseña" type="password"><br><br>
<button class="btn">Entrar</button>
<button onclick="closeLogin()">Volver</button>
</div>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/549XXXXXXXXXX" class="whatsapp">💬</a>

<!-- IA -->
<div class="ai-btn" onclick="toggleAI()">🤖</div>

<div class="ai-chat" id="aiChat">
<div id="chatBox"></div>
<input id="userInput" placeholder="Preguntá...">
</div>

<script>

// NAVEGACION
function goHome(){
home.style.display="flex";
productos.style.display="none";
categorias.style.display="none";
backBtn.style.display="none";
}

function showProductos(){
home.style.display="none";
productos.style.display="block";
categorias.style.display="none";
backBtn.style.display="block";
}

function showCategorias(){
home.style.display="none";
productos.style.display="none";
categorias.style.display="block";
backBtn.style.display="block";
}

function goBack(){goHome();}

// LOGIN
function openLogin(){
loginModal.classList.add("active");
}
function closeLogin(){
loginModal.classList.remove("active");
}

// IA MEJORADA
const respuestas={
"hola":"Hola 👋 ¿Buscás tazas, remeras o regalos?",
"precio":"Los precios varían según diseño. Ej: tazas desde $3000",
"envio":"Hacemos envíos a todo el país 🚚",
"default":"Podés preguntarme por productos, precios o envíos 😉"
};

userInput.addEventListener("keypress",function(e){
if(e.key==="Enter"){
let txt=this.value.toLowerCase();
let resp=respuestas[txt]||respuestas["default"];

chatBox.innerHTML+=`<p><b>Vos:</b> ${txt}</p>`;
chatBox.innerHTML+=`<p><b>IA:</b> ${resp}</p>`;
this.value="";
}
});

// SCROLL ANIM
window.addEventListener("scroll",()=>{
document.querySelectorAll(".reveal").forEach(el=>{
let top=el.getBoundingClientRect().top;
if(top<window.innerHeight-50){
el.classList.add("active");
}
});
});

</script>

</body>
</html>
