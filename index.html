<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda Sublimación</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

/* NAV */
nav{
display:flex;
justify-content:space-between;
padding:15px;
background:#020617;
position:sticky;
top:0;
z-index:1000;
}

.menu button{
margin-left:10px;
}

/* HERO */
.hero{
height:80vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.btn{
padding:10px 20px;
border:none;
border-radius:8px;
cursor:pointer;
background:#22c55e;
color:white;
}

/* INFO */
.info-section{
padding:40px;
text-align:center;
}

/* PRODUCTOS */
#productos{
display:none;
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.card{
background:#1e293b;
padding:10px;
border-radius:10px;
text-align:center;
}

.card img{
width:100%;
border-radius:10px;
}

/* CARRITO */
.cart{
position:fixed;
right:-300px;
top:0;
width:300px;
height:100%;
background:#020617;
padding:20px;
transition:0.3s;
z-index:2000;
}

.cart.active{
right:0;
}

/* MENU PANEL */
.panel{
position:fixed;
left:-250px;
top:0;
width:250px;
height:100%;
background:#020617;
padding:20px;
transition:0.3s;
z-index:2000;
}

.panel.active{
left:0;
}

/* ANIMACION */
.fly{
position:fixed;
width:60px;
z-index:3000;
transition:0.8s;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<h2>Tienda</h2>

<div class="menu">
<button onclick="showHome()">Inicio</button>
<button onclick="showProductos()">Productos</button>
<button onclick="toggleCart()">🛒</button>
<button onclick="toggleMenu()">☰</button>
</div>
</nav>

<!-- MENU LATERAL -->
<div class="panel" id="menuPanel">
<h3>Menú</h3>
<button onclick="toggleMenu()">Cerrar</button>
<p>Configuración</p>
<p>Perfil</p>
</div>

<!-- CARRITO -->
<div class="cart" id="cart">
<h3>Carrito</h3>
<button onclick="toggleCart()">Cerrar</button>
<ul id="cartList"></ul>
</div>

<!-- HOME -->
<div id="home">

<div class="hero">
<h1>Convertimos tus ideas en productos únicos</h1>

<div style="display:flex; gap:10px;">
<button class="btn" onclick="scrollInfo()">Ver más</button>
<button class="btn" onclick="showProductos()">Ver productos</button>
</div>
</div>

<div class="info-section" id="info">
<h2>¿Qué es la sublimación?</h2>
<p>Impresión de alta calidad en productos personalizados.</p>
</div>

</div>

<!-- PRODUCTOS -->
<div id="productos">

<h2>Productos</h2>

<button onclick="showHome()">⬅ Volver</button>

<div class="grid" id="grid"></div>

</div>

<script>

let productosArr=[
{name:"Taza",precio:1000,img:"https://via.placeholder.com/200"},
{name:"Remera",precio:3000,img:"https://via.placeholder.com/200"},
{name:"Gorra",precio:2000,img:"https://via.placeholder.com/200"}
];

let cart=[];

/* MOSTRAR SECCIONES */
function showHome(){
document.getElementById("home").style.display="block";
document.getElementById("productos").style.display="none";
}

function showProductos(){
document.getElementById("home").style.display="none";
document.getElementById("productos").style.display="block";
}

/* SCROLL */
function scrollInfo(){
document.getElementById("info").scrollIntoView({behavior:"smooth"});
}

/* MENU */
function toggleMenu(){
document.getElementById("menuPanel").classList.toggle("active");
}

/* CARRITO */
function toggleCart(){
document.getElementById("cart").classList.toggle("active");
}

/* RENDER PRODUCTOS */
function renderProductos(){
let grid=document.getElementById("grid");
grid.innerHTML="";
productosArr.forEach((p,i)=>{
grid.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>$${p.precio}</p>
<button onclick="add(${i})">Agregar</button>
</div>`;
});
}

/* AGREGAR AL CARRITO */
function add(i){

let img=document.querySelectorAll(".card img")[i];
let rect=img.getBoundingClientRect();

let clone=img.cloneNode();
clone.classList.add("fly");
clone.style.top=rect.top+"px";
clone.style.left=rect.left+"px";
document.body.appendChild(clone);

let cartRect=document.getElementById("cart").getBoundingClientRect();

setTimeout(()=>{
clone.style.top=cartRect.top+"px";
clone.style.left=cartRect.left+"px";
clone.style.width="20px";
clone.style.opacity="0.5";
},10);

setTimeout(()=>clone.remove(),800);

/* lógica */
let existing=cart.find(p=>p.name===productosArr[i].name);
if(existing) existing.qty++;
else cart.push({...productosArr[i],qty:1});

renderCart();
}

/* RENDER CARRITO */
function renderCart(){
let list=document.getElementById("cartList");
list.innerHTML="";
cart.forEach(p=>{
list.innerHTML+=`<li>${p.name} x${p.qty}</li>`;
});
}

renderProductos();

</script>

</body>
</html>
