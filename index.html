<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SublimArte Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#020617;color:white;overflow-x:hidden;}

/* NAV */
nav{
position:fixed;width:100%;
display:flex;justify-content:space-between;
padding:20px 40px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:1000;
}

.logo{color:#22c55e;font-weight:600;font-size:20px;}

.menu{display:flex;gap:20px;}
.menu a{cursor:pointer;color:white;text-decoration:none;}

/* HERO VIDEO */
.hero{
height:100vh;
position:relative;
display:flex;justify-content:center;align-items:center;
text-align:center;
overflow:hidden;
}

.hero video{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
z-index:-1;
filter:brightness(0.4);
}

.hero h1{font-size:50px;}

/* BOTON */
.btn{
background:#22c55e;
padding:12px 25px;
border-radius:30px;
cursor:pointer;
border:none;
color:white;
margin-top:20px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 20px #22c55e;
}

/* SECCIONES */
section{padding:80px 40px;}

/* PRODUCTOS */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

.card{
background:#1e293b;
border-radius:15px;
overflow:hidden;
transition:0.3s;
}

.card img{
width:100%;
height:200px;
object-fit:cover;
}

.card:hover{
transform:translateY(-10px) scale(1.03);
box-shadow:0 0 30px rgba(34,197,94,0.5);
}

/* CARRITO */
.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
padding:15px;
border-radius:50%;
cursor:pointer;
}

.cart-panel{
position:fixed;
right:-100%;
top:0;
width:300px;
height:100%;
background:#020617;
padding:20px;
transition:0.4s;
}

.cart-panel.active{right:0;}

/* WHATSAPP */
.whatsapp{
position:fixed;
bottom:20px;
left:20px;
background:#25D366;
padding:15px;
border-radius:50%;
}

/* LOGIN */
.modal{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.8);
display:none;justify-content:center;align-items:center;
}

.modal.active{display:flex;}

.modal-box{
background:#1e293b;
padding:30px;
border-radius:10px;
width:300px;
}

/* IA */
.ai{
position:fixed;
bottom:90px;
left:20px;
width:260px;
height:320px;
background:#1e293b;
display:none;
flex-direction:column;
padding:10px;
border-radius:10px;
}

.ai.active{display:flex;}

#chatBox{flex:1;overflow:auto;font-size:14px;}
input{padding:10px;border:none;border-radius:5px;}

</style>
</head>

<body>

<nav>
<div class="logo">SublimArte</div>
<div class="menu">
<a onclick="goHome()">Inicio</a>
<a onclick="showProductos()">Productos</a>
<a onclick="openLogin()">Login</a>
</div>
</nav>

<!-- HERO -->
<div id="home" class="hero">
<video autoplay muted loop>
<source src="https://cdn.coverr.co/videos/coverr-printing-on-a-shirt-9716/1080p.mp4">
</video>
<div>
<h1>Marca tu estilo</h1>
<p>Productos personalizados premium</p>
<button class="btn" onclick="showProductos()">Comprar</button>
</div>
</div>

<!-- PRODUCTOS -->
<section id="productos" style="display:none;">
<h2>Productos</h2>
<div class="grid" id="grid"></div>
</section>

<!-- LOGIN -->
<div class="modal" id="loginModal">
<div class="modal-box">
<h3>Login</h3>
<input placeholder="Usuario"><br><br>
<input type="password" placeholder="Contraseña"><br><br>
<button class="btn">Entrar</button>
<button onclick="closeLogin()">Volver</button>
</div>
</div>

<!-- CARRITO -->
<div class="cart-btn" onclick="toggleCart()">🛒</div>
<div class="cart-panel" id="cartPanel">
<h3>Carrito</h3>
<div id="cartItems"></div>
</div>

<!-- WHATSAPP -->
<a href="https://wa.me/549XXXXXXXXXX" class="whatsapp">💬</a>

<!-- IA -->
<div class="ai" id="aiBox">
<div id="chatBox"></div>
<input id="input" placeholder="Preguntá...">
</div>

<script>

// NAV
function goHome(){
home.style.display="flex";
productos.style.display="none";
}

function showProductos(){
home.style.display="none";
productos.style.display="block";
}

// LOGIN
function openLogin(){loginModal.classList.add("active");}
function closeLogin(){loginModal.classList.remove("active");}

// PRODUCTOS
const productosArr=[
{name:"Taza",precio:3000,img:"https://images.unsplash.com/photo-1606813909024-1f6b7c6aefc7"},
{name:"Remera",precio:6000,img:"https://images.unsplash.com/photo-1585386959984-a41552231658"},
{name:"Gorra",precio:4000,img:"https://images.unsplash.com/photo-1593032465175-481ac7f401c0"}
];

productosArr.forEach((p,i)=>{
grid.innerHTML+=`
<div class="card">
<img src="${p.img}">
<h3>${p.name}</h3>
<p>$${p.precio}</p>
<button class="btn" onclick="addToCart(${i})">Agregar</button>
</div>`;
});

// CARRITO
let cart=[];
function addToCart(i){
cart.push(productosArr[i]);
renderCart();
}
function renderCart(){
cartItems.innerHTML=cart.map(p=>`<p>${p.name} - $${p.precio}</p>`).join("");
}
function toggleCart(){
cartPanel.classList.toggle("active");
}

// IA MEJOR
input.addEventListener("keypress",e=>{
if(e.key==="Enter"){
let t=input.value.toLowerCase();
let r="Te ayudo con productos, precios o envíos 😉";

if(t.includes("precio")) r="Tenemos desde $3000";
if(t.includes("envio")) r="Envíos a todo el país";
if(t.includes("remera")) r="Las remeras son top ventas 🔥";

chatBox.innerHTML+=`<p><b>Vos:</b> ${t}</p>`;
chatBox.innerHTML+=`<p><b>IA:</b> ${r}</p>`;
input.value="";
}
});

// TOGGLE IA
document.querySelector(".whatsapp").onclick=()=>{
aiBox.classList.toggle("active");
}

</script>

</body>
</html>
