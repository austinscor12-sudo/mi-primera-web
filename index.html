<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SublimArte</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
}

/* NAV */
nav{
position:fixed;width:100%;
display:flex;justify-content:space-between;
padding:20px;
z-index:1000;
}

.logo{color:#22c55e;font-size:22px;}

.menu-btn{font-size:28px;cursor:pointer;}

/* MENU */
.overlay{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.95);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
gap:30px;
opacity:0;
pointer-events:none;
transition:0.4s;
}

.overlay.active{
opacity:1;
pointer-events:all;
}

.overlay a{
font-size:28px;
color:white;
text-decoration:none;
}

.close-btn{
position:absolute;
top:20px;
right:20px;
font-size:30px;
cursor:pointer;
}

/* HERO */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
background:linear-gradient(135deg,#22c55e,#3b82f6);
}

.hero h1{
font-size:50px;
}

.btn{
background:#22c55e;
padding:12px 25px;
border-radius:30px;
border:none;
cursor:pointer;
color:white;
margin-top:20px;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 20px #22c55e;
}

/* PRODUCTOS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:60px 20px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:15px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-10px);
box-shadow:0 0 20px rgba(34,197,94,0.5);
}

/* IA */
.ai-btn{
position:fixed;
bottom:20px;
left:20px;
background:#22c55e;
padding:15px;
border-radius:50%;
cursor:pointer;
}

.ai-chat{
position:fixed;
bottom:80px;
left:20px;
width:260px;
height:320px;
background:#1e293b;
display:none;
flex-direction:column;
padding:10px;
border-radius:10px;
}

.ai-chat.active{display:flex;}

#chatBox{
flex:1;
overflow:auto;
font-size:14px;
}

input{
padding:10px;
border:none;
border-radius:5px;
}

/* CARRITO */
.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:#3b82f6;
padding:15px;
border-radius:50%;
cursor:pointer;
}

.cart-panel{
position:fixed;
right:-100%;
top:0;
width:300px;
height:100%;
background:#020617;
padding:20px;
transition:0.4s;
}

.cart-panel.active{right:0;}

</style>
</head>

<body>

<nav>
<div class="logo">SublimArte</div>
<div class="menu-btn" onclick="openMenu()">☰</div>
</nav>

<!-- MENU -->
<div id="menu" class="overlay" onclick="closeMenu(event)">
<div class="close-btn" onclick="closeMenu()">✕</div>
<a href="#">Inicio</a>
<a href="#productos">Productos</a>
<a onclick="toggleCart()">Carrito</a>
</div>

<!-- HERO -->
<div class="hero">
<div>
<h1>Diseños que destacan</h1>
<p>Personalizá lo que quieras</p>
<button class="btn">Ver productos</button>
</div>
</div>

<section id="productos" class="products"></section>

<!-- IA -->
<div class="ai-btn" onclick="toggleAI()">🤖</div>

<div class="ai-chat" id="aiChat">
<div id="chatBox"></div>
<input id="userInput" placeholder="Preguntá algo...">
</div>

<!-- CARRITO -->
<div class="cart-btn" onclick="toggleCart()">🛒</div>

<div class="cart-panel" id="cartPanel">
<h3>Carrito</h3>
<div id="cartItems"></div>
</div>

<script>

// MENU
function openMenu(){
menu.classList.add("active");
}
function closeMenu(e){
if(!e || e.target.id==="menu") menu.classList.remove("active");
}

// IA MEJORADA
const respuestas={
"hola":"¡Hola! ¿Qué te gustaría comprar?",
"precio":"Tenemos desde $3000",
"envio":"Enviamos a todo el país 🚚",
"productos":"Tazas, remeras, gorras y más",
"default":"Podés preguntarme por precios, envíos o productos 😉"
};

userInput.addEventListener("keypress",function(e){
if(e.key==="Enter"){
let txt=this.value.toLowerCase();
let resp=respuestas[txt]||respuestas["default"];

chatBox.innerHTML+=`<p><b>Vos:</b> ${txt}</p>`;
chatBox.innerHTML+=`<p><b>IA:</b> ${resp}</p>`;
this.value="";
}
});

// PRODUCTOS
const productos=[
{name:"Taza personalizada",precio:3000},
{name:"Remera sublimada",precio:6000},
{name:"Gorra",precio:4000},
{name:"Almohadón",precio:5000}
];

productos.forEach((p,i)=>{
productosDiv.innerHTML+=`
<div class="card">
<h3>${p.name}</h3>
<p>$${p.precio}</p>
<button class="btn" onclick="addToCart(${i})">Agregar</button>
</div>`;
});

// CARRITO
let cart=[];

function addToCart(i){
cart.push(productos[i]);
renderCart();
}

function renderCart(){
cartItems.innerHTML=cart.map(p=>`<p>${p.name} - $${p.precio}</p>`).join("");
}

function toggleCart(){
cartPanel.classList.toggle("active");
}

// IA TOGGLE
function toggleAI(){
aiChat.classList.toggle("active");
}

</script>

</body>
</html>
