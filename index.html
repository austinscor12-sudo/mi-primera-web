<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SublimArte</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f172a;color:white;overflow-x:hidden;}

/* NAV */
nav{
position:fixed;width:100%;padding:20px 40px;
display:flex;justify-content:space-between;align-items:center;
background:rgba(0,0,0,0.6);backdrop-filter:blur(10px);
z-index:1000;
}

.logo{color:#22c55e;font-size:22px;font-weight:600;}

.menu-btn{
font-size:30px;cursor:pointer;
}

/* MENU FULL */
.overlay{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#020617;
display:flex;flex-direction:column;
justify-content:center;align-items:center;
gap:40px;
transform:translateY(-100%);
transition:0.5s;
z-index:2000;
}

.overlay.active{transform:translateY(0);}

.overlay a{
font-size:30px;color:white;text-decoration:none;
transition:0.3s;
}

.overlay a:hover{
color:#22c55e;transform:scale(1.2);
}

/* HERO */
.hero{
height:100vh;
display:flex;justify-content:center;align-items:center;
text-align:center;
background:linear-gradient(135deg,#22c55e,#3b82f6);
}

.hero h1{
font-size:50px;
animation:fadeUp 1s ease;
}

.btn{
background:#22c55e;
padding:12px 25px;
border-radius:30px;
text-decoration:none;
color:white;
transition:0.3s;
display:inline-block;
margin-top:20px;
}

.btn:hover{
transform:scale(1.1);
background:#16a34a;
}

/* PRODUCTOS */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:80px 40px;
}

.card{
background:#1e293b;
padding:30px;
border-radius:15px;
text-align:center;
transition:0.2s;
transform-style:preserve-3d;
}

/* IA */
.ai-btn{
position:fixed;
bottom:20px;
left:20px;
background:#22c55e;
padding:15px;
border-radius:50%;
cursor:pointer;
}

.ai-chat{
position:fixed;
bottom:80px;
left:20px;
width:260px;
height:320px;
background:#1e293b;
display:none;
flex-direction:column;
padding:10px;
border-radius:10px;
}

.ai-chat.active{display:flex;}

#chatBox{
flex:1;
overflow:auto;
font-size:14px;
margin-bottom:5px;
}

input{
padding:10px;
border:none;
border-radius:5px;
}

/* CARRITO */
.cart-btn{
position:fixed;
bottom:20px;
right:20px;
background:#22c55e;
padding:15px;
border-radius:50%;
cursor:pointer;
}

.cart-panel{
position:fixed;
right:-100%;
top:0;
width:300px;
height:100%;
background:#020617;
padding:20px;
transition:0.4s;
}

.cart-panel.active{right:0;}

@keyframes fadeUp{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>

<body>

<nav>
<div class="logo">SublimArte</div>
<div class="menu-btn" onclick="toggleMenu()">☰</div>
</nav>

<!-- MENU -->
<div id="menuOverlay" class="overlay">
<a href="#">Inicio</a>
<a href="#productos">Productos</a>
<a href="#" onclick="toggleCart()">Carrito</a>
</div>

<!-- HERO -->
<div class="hero">
<div>
<h1>Diseños únicos</h1>
<p>Productos personalizados a tu estilo</p>
<a href="#productos" class="btn">Ver productos</a>
</div>
</div>

<!-- PRODUCTOS -->
<section class="products" id="productos"></section>

<!-- IA -->
<div class="ai-btn" onclick="toggleAI()">🤖</div>

<div class="ai-chat" id="aiChat">
<div id="chatBox"></div>
<input id="userInput" placeholder="Preguntá algo...">
</div>

<!-- CARRITO -->
<div class="cart-btn" onclick="toggleCart()">🛒</div>

<div class="cart-panel" id="cartPanel">
<h3>Carrito</h3>
<div id="cartItems"></div>
</div>

<script>

// MENU
function toggleMenu(){
document.getElementById("menuOverlay").classList.toggle("active");
}

// IA
function toggleAI(){
document.getElementById("aiChat").classList.toggle("active");
}

const respuestas={
"precio":"Desde $3000",
"envio":"Envíos a todo el país",
"productos":"Tazas, remeras, gorras y más"
};

userInput.addEventListener("keypress",function(e){
if(e.key==="Enter"){
let texto=this.value.toLowerCase();
let resp=respuestas[texto]||"Escribinos por WhatsApp 😉";

chatBox.innerHTML+=`<p><b>Vos:</b> ${texto}</p>`;
chatBox.innerHTML+=`<p><b>IA:</b> ${resp}</p>`;
this.value="";
}
});

// PRODUCTOS
const productos=[
{name:"Taza personalizada",precio:3000},
{name:"Remera sublimada",precio:6000},
{name:"Gorra",precio:4000},
{name:"Almohadón",precio:5000}
];

let cart=[];

const cont=document.getElementById("productos");

productos.forEach((p,i)=>{
cont.innerHTML+=`
<div class="card">
<h3>${p.name}</h3>
<p>$${p.precio}</p>
<button onclick="addToCart(${i})" class="btn">Agregar</button>
</div>`;
});

// CARRITO
function addToCart(i){
cart.push(productos[i]);
renderCart();
}

function renderCart(){
let html="";
cart.forEach(p=>{
html+=`<p>${p.name} - $${p.precio}</p>`;
});
cartItems.innerHTML=html;
}

function toggleCart(){
document.getElementById("cartPanel").classList.toggle("active");
}

// EFECTO 3D
document.addEventListener("mousemove",(e)=>{
document.querySelectorAll(".card").forEach(card=>{
let rect=card.getBoundingClientRect();
let x=e.clientX-rect.left;
let y=e.clientY-rect.top;

let rx=(y/rect.height-0.5)*-10;
let ry=(x/rect.width-0.5)*10;

card.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg)`;
});
});

</script>

</body>
</html>
